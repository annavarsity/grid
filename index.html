<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Parcel — Final Execution</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6bad;
            --bg: #080b0f;
            --surface: #141b22;
            --text: #e8f0f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--accent);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        #splash-screen.hidden { opacity: 0; pointer-events: none; }

        header { text-align: center; padding: 60px 20px 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .ice-cream-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #1e2d3a;
            transition: transform 0.3s ease;
        }

        .ice-cream-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .img-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #1e2d3a;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .label {
            padding: 15px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            text-align: center;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="deploy()">
        <div style="font-size: 80px;">📦</div>
        <p style="font-weight: 800; letter-spacing: 5px; margin-top: 15px;">ICECREAM PARCEL</p>
        <p style="font-size: 10px; font-family: 'Space Mono'; opacity: 0.8;">TAP TO INITIALIZE CONTENT</p>
    </div>

    <header>
        <h1 style="letter-spacing: -2px;">Infinite Scoops</h1>
        <p style="font-family: 'Space Mono'; font-size: 10px; color: var(--accent); margin-top: 8px;">
            SYSTEM_STABLE // NO_DIPLOMATICS
        </p>
    </header>

    <div class="grid" id="main-grid"></div>

    <script>
        // High-reliability direct URLs from Wikimedia and reliable CDNs
        const scoopArsenal = [
            "https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Strawberry_ice_cream_cone_%285071336598%29.jpg/640px-Strawberry_ice_cream_cone_%285071336598%29.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Ice_cream_cone_with_scoops_outdoors.jpg/640px-Ice_cream_cone_with_scoops_outdoors.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Vanilla_Ice_Cream_Cone_at_the_Fair.jpg/640px-Vanilla_Ice_Cream_Cone_at_the_Fair.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Strawberry_ice_cream_cone.jpg/640px-Strawberry_ice_cream_cone.jpg",
            "https://images.pexels.com/photos/1352251/pexels-photo-1352251.jpeg?auto=compress&cs=tinysrgb&w=600",
            "https://images.pexels.com/photos/1332267/pexels-photo-1332267.jpeg?auto=compress&cs=tinysrgb&w=600",
            "https://images.pexels.com/photos/1291712/pexels-photo-1291712.jpeg?auto=compress&cs=tinysrgb&w=600",
            "https://images.pexels.com/photos/1625235/pexels-photo-1625235.jpeg?auto=compress&cs=tinysrgb&w=600"
        ];

        function deploy() {
            document.getElementById('splash-screen').classList.add('hidden');
            const grid = document.getElementById('main-grid');
            
            scoopArsenal.forEach((url, index) => {
                const card = document.createElement('div');
                card.className = 'ice-cream-card';
                card.innerHTML = `
                    <div class="img-box">
                        <img src="${url}" alt="Ice Cream Scoop">
                    </div>
                    <div class="label">UNIT_0${index + 1} // VERIFIED</div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
