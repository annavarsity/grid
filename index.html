<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Parcel — Infinite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6bad;
            --bg: #080b0f; /* Darker theme for higher contrast */
            --surface: #141b22;
            --text: #e8f0f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--accent);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #splash-screen.opened {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.2);
        }

        .parcel-box {
            font-size: 100px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Content */
        header { padding: 60px 20px 30px; text-align: center; }
        h1 { font-size: 40px; letter-spacing: -1px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .ice-cream-card {
            background: var(--surface);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a3f52;
            animation: slideUp 0.5s ease backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ice-cream-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            background: #1e2d3a;
        }

        .label {
            padding: 15px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-align: center;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* The Arsenal Button */
        #load-more {
            display: block;
            margin: 40px auto;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px 30px;
            font-family: 'Space Mono', monospace;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        #load-more:hover {
            background: var(--accent);
            color: var(--bg);
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="openParcel()">
        <div class="parcel-box">🎁</div>
        <p style="margin-top:20px; font-weight:800; letter-spacing:3px;">ICECREAM PARCEL</p>
        <p style="font-family:'Space Mono'; font-size:10px; opacity:0.7;">TOUCH TO INITIALIZE</p>
    </div>

    <header>
        <h1>Infinite Scoops</h1>
        <p style="font-family:'Space Mono'; color:var(--accent); font-size:12px;">NO DIPLOMATICS · JUST DESSERT</p>
    </header>

    <div class="grid" id="main-grid"></div>

    <button id="load-more" onclick="generateImages(8)">RELOAD ARSENAL →</button>

    <script>
        const grid = document.getElementById('main-grid');
        const flavors = ["Vanilla", "Berry", "Choco", "Mint", "Mango", "Nutty", "Swirl", "Glaze"];

        function generateImages(count) {
            for (let i = 0; i < count; i++) {
                const randomId = Math.floor(Math.random() * 10000);
                const flavor = flavors[Math.floor(Math.random() * flavors.length)];
                
                const card = document.createElement('div');
                card.className = 'ice-cream-card';
                // Using Picsum as a fallback/primary for faster random loading
                const imgUrl = `https://picsum.photos/seed/${randomId}/400/400?grayscale=0`;
                
                card.innerHTML = `
                    <img src="${imgUrl}" alt="Ice Cream">
                    <div class="label">PHASE_${randomId} // ${flavor.toUpperCase()}</div>
                `;
                grid.appendChild(card);
            }
        }

        function openParcel() {
            document.getElementById('splash-screen').classList.add('opened');
            generateImages(12); // Initial load
        }
    </script>
</body>
</html>
