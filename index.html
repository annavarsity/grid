<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Parcel</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6bad;
            --bg: #fff5f8;
            --text: #2d132c;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Splash Screen (The Parcel) */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--accent);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #splash-screen.opened {
            transform: translateY(-100%);
        }

        .parcel-box {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }

        .parcel-text {
            margin-top: 24px;
            color: white;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            text-align: center;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Main Content */
        header {
            padding: 40px 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 0 20px 40px;
            max-width: 800px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease 0.4s;
        }

        .grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .ice-cream-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(255, 107, 173, 0.1);
            transition: transform 0.3s ease;
        }

        .ice-cream-card:hover {
            transform: scale(1.05);
        }

        .ice-cream-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #eee;
        }

        .ice-cream-card .label {
            padding: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            text-align: center;
            font-weight: 700;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- First Screen: The Parcel -->
    <div id="splash-screen" onclick="openParcel()">
        <div class="parcel-box">📦</div>
        <div class="parcel-text">ICECREAM PARCEL<br><span style="font-size: 12px; opacity: 0.8; font-family: 'Space Mono';">TAP TO UNBOX</span></div>
    </div>

    <!-- Second Screen: Content -->
    <header>
        <h1>Fresh Scoops</h1>
        <p style="font-family: 'Space Mono'; font-size: 11px; color: var(--accent);">UNBOXED JUST FOR YOU</p>
    </header>

    <div class="grid" id="image-grid">
        <!-- Images will be injected here -->
    </div>

    <script>
        const iceCreams = [
            { name: "Strawberry Bloom", url: "https://images.unsplash.com/photo-1567206563066-ec58d1a0bc9b?auto=format&fit=crop&q=80&w=400" },
            { name: "Classic Vanilla", url: "https://images.unsplash.com/photo-1570197788417-0e82375c9371?auto=format&fit=crop&q=80&w=400" },
            { name: "Mint Chocolate", url: "https://images.unsplash.com/photo-1532678465554-94846274c297?auto=format&fit=crop&q=80&w=400" },
            { name: "Dark Cocoa", url: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&q=80&w=400" },
            { name: "Berry Swirl", url: "https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?auto=format&fit=crop&q=80&w=400" },
            { name: "Mango Tango", url: "https://images.unsplash.com/photo-1505394033343-43396b2d8d90?auto=format&fit=crop&q=80&w=400" }
        ];

        function openParcel() {
            const splash = document.getElementById('splash-screen');
            const grid = document.getElementById('image-grid');
            
            // 1. Hide the splash screen
            splash.classList.add('opened');
            
            // 2. Generate and load images
            iceCreams.forEach(item => {
                const card = document.createElement('div');
                card.className = 'ice-cream-card';
                card.innerHTML = `
                    <img src="${item.url}" alt="${item.name}">
                    <div class="label">${item.name.toUpperCase()}</div>
                `;
                grid.appendChild(card);
            });

            // 3. Trigger grid animation
            grid.classList.add('visible');
        }
    </script>
</body>
</html>
