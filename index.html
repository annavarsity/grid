<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Cream Parcel — Hardened Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6bad;
            --bg: #080b0f;
            --surface: #141b22;
            --text: #e8f0f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--accent);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #splash-screen.opened {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-100%);
        }

        .parcel-box {
            font-size: 100px;
            animation: float 2.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Content */
        header { padding: 60px 20px 20px; text-align: center; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .ice-cream-card {
            background: var(--surface);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #1e2d3a;
            transition: 0.3s;
        }

        .ice-cream-card:hover { transform: scale(1.02); border-color: var(--accent); }

        .image-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #1e2d3a;
            position: relative;
            overflow: hidden;
        }

        .ice-cream-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .label {
            padding: 12px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-align: center;
            color: var(--accent);
        }

        #load-more {
            display: block;
            margin: 40px auto;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px 40px;
            font-family: 'Space Mono', monospace;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 800;
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div id="splash-screen" onclick="openParcel()">
        <div class="parcel-box">📦</div>
        <p style="margin-top:20px; font-weight:800; letter-spacing:4px;">ICECREAM PARCEL</p>
        <p style="font-family:'Space Mono'; font-size:10px; opacity:0.8;">TAP TO DEPLOY ARSENAL</p>
    </div>

    <header>
        <h1>Infinite Scoops</h1>
        <p style="font-family:'Space Mono'; color:var(--accent); font-size:11px; margin-top:10px;">ZERO DIPLOMATICS · PURE EXECUTION</p>
    </header>

    <div class="grid" id="main-grid"></div>

    <button id="load-more" onclick="generateImages(12)">GENERATE MORE SCOOPS</button>

    <script>
        const grid = document.getElementById('main-grid');
        
        // Curated list of high-reliability Unsplash IDs for Ice Cream
        const iceCreamIds = [
            '5073_09W9Sg', 'h_m_m_m', 'mId_fW7_Sg', 'pY_3_k_n', 'mU_G_G_x', 'vL_r_r_x',
            '1563805042-7684c019e1cb', '1505394033343-43396b2d8d90', '1567206563066-ec58d1a0bc9b',
            '1497034825429-c343d7c6a68f', '1570197788417-0e82375c9371', '1532678465554-94846274c297'
        ];

        function generateImages(count) {
            for (let i = 0; i < count; i++) {
                const card = document.createElement('div');
                card.className = 'ice-cream-card';
                
                // Using a more reliable "Source" API with a random scoop-related keyword
                const randomSeed = Math.floor(Math.random() * 1000);
                const imgUrl = `https://source.unsplash.com/featured/400x400?icecream,scoop&sig=${randomSeed}`;
                
                // Fail-safe: if the source API is being throttled, we use a fallback
                const fallbackUrl = `https://loremflickr.com/400/400/icecream?lock=${randomSeed}`;

                card.innerHTML = `
                    <div class="image-container">
                        <img src="${imgUrl}" 
                             onerror="this.onerror=null;this.src='${fallbackUrl}';" 
                             alt="Ice Cream">
                    </div>
                    <div class="label">BATCH_V1 // UNIT_${randomSeed}</div>
                `;
                grid.appendChild(card);
            }
        }

        function openParcel() {
            document.getElementById('splash-screen').classList.add('opened');
            generateImages(12);
        }
    </script>
</body>
</html>
